<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <title>toma</title>
  </head>
  <body class="min-h-screen flex items-center justify-center p-4">
    <div id="app" class="w-full max-w-md bg-toma-surface border-hairline border-toma-border rounded-[12px] p-6">
        
        <!-- Header / Logo -->
        <header class="flex items-center gap-2 mb-8">
            <div class="w-3 h-3 rounded-full bg-toma-brand relative">
                <div class="absolute -top-[2px] left-1/2 -translate-x-1/2 w-[2px] h-[4px] bg-[#1A6B3C]"></div>
            </div>
            <h1 class="text-[16px] font-medium tracking-[-0.02em] leading-none text-toma-primary">toma</h1>
        </header>

        <!-- Modos -->
        <div class="flex gap-2 mb-8" id="mode-selector">
            <button class="mode-btn active px-3 py-1.5 rounded-[4px] text-[13px] font-medium bg-toma-elevated text-toma-primary border-hairline border-toma-border transition-colors cursor-pointer" data-foco="25" data-pausa="5">Focus</button>
            <button class="mode-btn px-3 py-1.5 rounded-[4px] text-[13px] font-medium bg-transparent text-toma-muted border-hairline border-transparent hover:bg-toma-elevated hover:text-toma-primary transition-colors cursor-pointer" data-foco="50" data-pausa="10">Deep Work</button>
            <button class="mode-btn px-3 py-1.5 rounded-[4px] text-[13px] font-medium bg-transparent text-toma-muted border-hairline border-transparent hover:bg-toma-elevated hover:text-toma-primary transition-colors cursor-pointer" data-foco="15" data-pausa="3">Read</button>
            <button class="mode-btn px-3 py-1.5 rounded-[4px] text-[13px] font-medium bg-transparent text-toma-muted border-hairline border-transparent hover:bg-toma-elevated hover:text-toma-primary transition-colors cursor-pointer" data-foco="custom" data-pausa="custom">Custom</button>
        </div>

        <!-- Custom Settings (Hidden by default) -->
        <div id="custom-settings" class="hidden flex gap-4 mb-8">
            <div class="flex-1">
                <label class="block text-[12px] text-toma-muted mb-1">Focus (min)</label>
                <input type="number" id="custom-focus-input" value="25" min="1" class="w-full bg-toma-elevated border-hairline border-toma-border rounded-[8px] px-3 py-2 text-[14px] text-toma-primary focus:border-toma-muted transition-colors hide-arrows">
            </div>
            <div class="flex-1">
                <label class="block text-[12px] text-toma-muted mb-1">Break (min)</label>
                <input type="number" id="custom-break-input" value="5" min="1" class="w-full bg-toma-elevated border-hairline border-toma-border rounded-[8px] px-3 py-2 text-[14px] text-toma-primary focus:border-toma-muted transition-colors hide-arrows">
            </div>
        </div>

        <!-- Timer Display -->
        <div class="mb-8">
            <div class="font-display text-[48px] leading-none text-toma-primary tabular-nums" id="timer-display">25:00</div>
            <div class="text-[12px] text-toma-muted mt-2" id="status-label">Ready.</div>
        </div>

        <!-- Controls -->
        <div class="space-y-4">
            <div class="flex gap-2">
                <input type="text" id="task-input" placeholder="Task description..." class="flex-1 bg-toma-elevated border-hairline border-toma-border rounded-[8px] px-3 py-2 text-[14px] text-toma-primary placeholder-toma-muted focus:border-toma-muted transition-colors">
                <input type="number" id="cycles-input" value="1" min="1" title="Cycles" class="w-16 bg-toma-elevated border-hairline border-toma-border rounded-[8px] px-3 py-2 text-[14px] text-toma-primary focus:border-toma-muted transition-colors text-center hide-arrows">
            </div>
            
            <div id="action-buttons" class="flex gap-2">
                <button id="start-btn" class="flex-1 bg-toma-brand text-toma-bg font-medium text-[14px] py-2.5 rounded-[8px] hover:bg-toma-accent transition-colors cursor-pointer">
                    Start session
                </button>
                <button id="pause-btn" class="hidden flex-1 bg-toma-elevated text-toma-primary font-medium text-[14px] py-2.5 rounded-[8px] border-hairline border-toma-border hover:border-toma-muted transition-colors cursor-pointer">
                    Pause
                </button>
                <button id="stop-btn" class="hidden flex-1 bg-transparent text-[#E8432D] font-medium text-[14px] py-2.5 rounded-[8px] border-hairline border-[#E8432D]/30 hover:border-[#E8432D] transition-colors cursor-pointer">
                    Stop
                </button>
            </div>
        </div>

        <!-- History -->
        <div class="mt-8 pt-6 border-t-hairline border-toma-border">
            <h2 class="text-[12px] font-medium text-toma-muted mb-4 uppercase tracking-wider">Session History</h2>
            <ul id="history-list" class="space-y-2 max-h-[150px] overflow-y-auto pr-2 custom-scrollbar">
                <!-- Items will be injected here by JS -->
                <li class="text-[13px] text-toma-muted">Loading...</li>
            </ul>
        </div>
    </div>
    
    <script type="module" src="./main.js"></script>
  </body>
</html>
