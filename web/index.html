<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
    <title>toma</title>
  </head>
  <body class="min-h-screen flex items-center justify-center p-4">
    <div id="app" class="w-full max-w-md bg-toma-surface border-hairline border-toma-border rounded-[12px] p-6">
        
        <!-- Header / Logo -->
        <header class="flex items-center gap-2 mb-8">
            <div class="w-3 h-3 rounded-full bg-toma-brand relative">
                <div class="absolute -top-[2px] left-1/2 -translate-x-1/2 w-[2px] h-[4px] bg-[#1A6B3C]"></div>
            </div>
            <h1 class="text-[16px] font-medium tracking-[-0.02em] leading-none text-toma-primary">toma</h1>
        </header>

        <!-- Modos -->
        <div class="flex gap-2 mb-8" id="mode-selector">
            <button class="mode-btn active px-3 py-1.5 rounded-[4px] text-[13px] font-medium bg-toma-elevated text-toma-primary border-hairline border-toma-border transition-colors cursor-pointer" data-foco="25" data-pausa="5">Focus</button>
            <button class="mode-btn px-3 py-1.5 rounded-[4px] text-[13px] font-medium bg-transparent text-toma-muted border-hairline border-transparent hover:bg-toma-elevated hover:text-toma-primary transition-colors cursor-pointer" data-foco="50" data-pausa="10">Deep Work</button>
            <button class="mode-btn px-3 py-1.5 rounded-[4px] text-[13px] font-medium bg-transparent text-toma-muted border-hairline border-transparent hover:bg-toma-elevated hover:text-toma-primary transition-colors cursor-pointer" data-foco="15" data-pausa="3">Read</button>
        </div>

        <!-- Timer Display -->
        <div class="mb-8">
            <div class="font-display text-[48px] leading-none text-toma-primary tabular-nums" id="timer-display">25:00</div>
            <div class="text-[12px] text-toma-muted mt-2" id="status-label">Ready.</div>
        </div>

        <!-- Controls -->
        <div class="space-y-4">
            <input type="text" id="task-input" placeholder="Task description..." class="w-full bg-toma-elevated border-hairline border-toma-border rounded-[8px] px-3 py-2 text-[14px] text-toma-primary placeholder-toma-muted focus:border-toma-muted transition-colors">
            
            <button id="start-btn" class="w-full bg-toma-brand text-toma-bg font-medium text-[14px] py-2.5 rounded-[8px] hover:bg-toma-accent transition-colors cursor-pointer">
                Start session
            </button>
        </div>
    </div>
    
    <script type="module" src="./main.js"></script>
  </body>
</html>
